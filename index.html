<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Estilo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<div id="hud">
  <div><strong>Dano:</strong> <span id="dano">5</span></div>
  <div><strong>Tipo:</strong> <span id="tipoDano">Físico</span></div>
  <div><strong>Rank:</strong> <span id="rankTopo">-</span></div>
</div>
  
<div class="container">

  <h1>Estilo</h1>

  <!-- RANK -->
  <div class="rank-box">
    <span id="rank">D</span>
  </div>

  <!-- BARRA -->
  <div class="barra">
    <div id="progresso"></div>
  </div>

  <!-- PONTOS -->
  <p>Pontos: <span id="pontos">0</span>/10</p>

  <span id="rankTopo">-</span>

  <hr>

  <h2>Habilidades</h2>
  <div id="habilidades" class="habilidades"></div>

  <!-- BOTÕES -->
  <div class="botoes">
    <button class="erro" onclick="erro()">Erro</button>
    <button class="acerto" onclick="acerto()">Acerto</button>
    <button class="devil" onclick="devil()">Devil</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
